# Release pipeline: push a tag like v0.9.1 and this builds signed installers
# for macOS / Windows / Linux and attaches them to a draft GitHub Release.
#
# Signing is optional until certificates exist — add these repo secrets to
# enable it (see DISTRIBUTION.md):
#   macOS:  APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#           APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#   Win:    WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon
            args: ""
          - platform: macos-13       # Intel
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux system deps (webkit + serial)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libudev-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment once signing secrets exist:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VX Telemetry ${{ github.ref_name }}"
          releaseBody: "Installers built from ${{ github.sha }}. See the README for platform notes."
          releaseDraft: true
          args: ${{ matrix.args }}
